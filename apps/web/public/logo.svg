<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="40%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e11d48" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Modern heart-globe icon -->
  <g transform="translate(52, 52)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#globeGrad)" stroke-width="2" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="18" ry="32" fill="none" stroke="url(#globeGrad)" stroke-width="1.5" opacity="0.2"/>
    <line x1="-32" y1="0" x2="32" y2="0" stroke="url(#globeGrad)" stroke-width="1" opacity="0.2"/>
    <path d="M0,18 C0,18 -26,-8 -26,-22 C-26,-32 -14,-38 0,-26 C14,-38 26,-32 26,-22 C26,-8 0,18 0,18 Z" 
          fill="url(#iconGrad)" opacity="0.9"/>
    <path d="M-20,-28 Q-5,-40 12,-30" stroke="url(#accentGrad)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="2,3" opacity="0.6"/>
    <circle cx="12" cy="-30" r="2" fill="url(#accentGrad)" opacity="0.8"/>
  </g>

  <!-- Modern typography -->
  <text x="100" y="62" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800" fill="#1e293b" letter-spacing="3">LAND</text>
  <text x="100" y="104" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="300" fill="#94a3b8" letter-spacing="5">OVER</text>
  <text x="252" y="104" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="800" fill="url(#accentGrad)" letter-spacing="5">SEA</text>
  
  <!-- Modern underline accent -->
  <rect x="100" y="116" width="260" height="2.5" rx="1.25" fill="url(#accentGrad)" opacity="0.4"/>
  
  <!-- Tagline -->
  <text x="230" y="140" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="500" fill="#94a3b8" letter-spacing="4" text-anchor="middle">CONNECTING HEARTS ACROSS BORDERS</text>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="140" r="1.5" fill="url(#iconGrad)" opacity="0.4"/>
  <circle cx="360" cy="140" r="1.5" fill="url(#globeGrad)" opacity="0.4"/>
</svg>
