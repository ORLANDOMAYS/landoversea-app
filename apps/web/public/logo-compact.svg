<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <linearGradient id="hg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="60%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- Small heart icon -->
  <g transform="translate(28, 28)">
    <path d="M0,14 C0,14 -18,-8 -18,-18 C-18,-25 -10,-30 0,-21 C10,-30 18,-25 18,-18 C18,-8 0,14 0,14 Z" 
          fill="url(#hg)" opacity="0.2"/>
  </g>

  <!-- "Land" -->
  <text x="52" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-style="italic" font-weight="700" fill="url(#lg)" letter-spacing="-0.5">Land</text>
  
  <!-- "Over" -->
  <text x="118" y="38" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#64748b" letter-spacing="0.5">Over</text>
  
  <!-- "SEA" -->
  <text x="180" y="38" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="800" fill="url(#sg)" letter-spacing="3">SEA</text>
  
  <!-- Accent line -->
  <path d="M52,46 Q150,42 248,46" stroke="url(#wg)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Tagline small -->
  <text x="150" y="62" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="6.5" font-weight="600" fill="#94a3b8" letter-spacing="2.5" text-anchor="middle">CONNECTING HEARTS ACROSS BORDERS</text>
</svg>
