<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="heartGradW" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fecdd3"/>
    </linearGradient>
    <linearGradient id="lineGradW" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fecdd3"/>
      <stop offset="50%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
  </defs>
  
  <!-- Heart shape behind text -->
  <g transform="translate(200, 62)">
    <path d="M0,30 C0,30 -48,-20 -48,-46 C-48,-67 -26,-78 0,-54 C26,-78 48,-67 48,-46 C48,-20 0,30 0,30 Z" 
          fill="url(#heartGradW)" opacity="0.15"/>
  </g>

  <!-- "Land" -->
  <text x="157" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-style="italic" font-weight="700" fill="#ffffff" letter-spacing="-1">Land</text>
  
  <!-- "Over" -->
  <text x="132" y="128" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="400" fill="rgba(255,255,255,0.8)" letter-spacing="1">Over</text>
  
  <!-- "SEA" -->
  <text x="228" y="128" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="800" fill="#ffffff" letter-spacing="5">SEA</text>
  
  <!-- Accent wave line -->
  <path d="M118,142 Q200,134 282,142" stroke="url(#lineGradW)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Tagline -->
  <text x="200" y="168" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.6)" letter-spacing="3.2" text-anchor="middle">CONNECTING HEARTS ACROSS BORDERS</text>
</svg>
