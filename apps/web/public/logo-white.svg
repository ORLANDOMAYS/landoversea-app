<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" fill="none">
  <defs>
    <linearGradient id="iconGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fecdd3"/>
    </linearGradient>
    <linearGradient id="accentGradW" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.5)"/>
    </linearGradient>
    <linearGradient id="globeGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.3)"/>
    </linearGradient>
  </defs>

  <!-- Modern heart-globe icon (white version) -->
  <g transform="translate(52, 52)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#globeGradW)" stroke-width="2" opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="18" ry="32" fill="none" stroke="url(#globeGradW)" stroke-width="1.5" opacity="0.3"/>
    <line x1="-32" y1="0" x2="32" y2="0" stroke="url(#globeGradW)" stroke-width="1" opacity="0.25"/>
    <path d="M0,18 C0,18 -26,-8 -26,-22 C-26,-32 -14,-38 0,-26 C14,-38 26,-32 26,-22 C26,-8 0,18 0,18 Z" 
          fill="url(#iconGradW)" opacity="0.9"/>
    <path d="M-20,-28 Q-5,-40 12,-30" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="2,3"/>
    <circle cx="12" cy="-30" r="2" fill="rgba(255,255,255,0.6)"/>
  </g>

  <!-- Modern typography (white) -->
  <text x="100" y="62" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="3">LAND</text>
  <text x="100" y="104" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="300" fill="rgba(255,255,255,0.7)" letter-spacing="5">OVER</text>
  <text x="252" y="104" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="800" fill="#ffffff" letter-spacing="5">SEA</text>
  
  <!-- Modern underline accent -->
  <rect x="100" y="116" width="260" height="2.5" rx="1.25" fill="url(#accentGradW)" opacity="0.4"/>
  
  <!-- Tagline -->
  <text x="230" y="140" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="4" text-anchor="middle">CONNECTING HEARTS ACROSS BORDERS</text>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="140" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="360" cy="140" r="1.5" fill="rgba(255,255,255,0.3)"/>
</svg>
